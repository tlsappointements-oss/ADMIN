<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProcureOS — PN Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0F14;--surf:#13161E;--surf2:#1A1E29;--border:#252A38;
  --text:#E2E5F0;--muted:#636A85;--dim:#2E3348;
  --cyan:#00D4FF;--green:#00E5A0;--red:#FF4757;--orange:#FF9500;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}
#top{height:46px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:10}
.logo{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--cyan);letter-spacing:.15em;display:flex;align-items:center;gap:6px}
.logo-sq{width:18px;height:18px;background:var(--cyan);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#000}
.sep{width:1px;height:18px;background:var(--border)}
#upbtn{background:var(--surf2);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:10px;font-family:'IBM Plex Mono',monospace;padding:5px 11px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px}
#upbtn:hover{border-color:var(--cyan);color:var(--cyan)}
.stats{margin-left:auto;display:flex;gap:6px}
.stat{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);background:var(--surf2);border:1px solid var(--border);border-radius:3px;padding:2px 7px}
.stat b{color:var(--text)}
#wrap{display:flex;height:calc(100vh - 46px);overflow:hidden}
#side{width:260px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column}
#side-head{padding:8px 10px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px;flex-shrink:0}
#srch{background:var(--surf2);border:1px solid var(--border);border-radius:5px;padding:6px 9px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;outline:none;width:100%}
#srch:focus{border-color:var(--cyan)}
#srch::placeholder{color:var(--dim)}
.frow{display:flex;gap:4px}
.fb{flex:1;background:var(--surf2);border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:9px;font-family:'IBM Plex Mono',monospace;padding:4px;cursor:pointer;text-align:center;transition:.12s}
.fb.on{background:rgba(0,212,255,.1);color:var(--cyan);border-color:rgba(0,212,255,.3)}
#pnlist{flex:1;overflow-y:auto;padding:3px 5px}
.pn-item{padding:7px 8px;border-radius:5px;cursor:pointer;margin-bottom:1px}
.pn-item:hover{background:var(--surf2)}
.pn-item.sel{background:rgba(0,212,255,.08);border-left:2px solid var(--cyan);padding-left:6px}
.pn-num{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--cyan)}
.pn-desc{font-size:10px;color:var(--muted);margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.pn-tags{display:flex;gap:3px;margin-top:3px}
.tag{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;padding:1px 5px;border-radius:2px}
.tag-l74{background:rgba(0,212,255,.12);color:var(--cyan);border:1px solid rgba(0,212,255,.2)}
.tag-d74{background:rgba(255,149,0,.12);color:var(--orange);border:1px solid rgba(255,149,0,.2)}
.tag-com{background:rgba(99,106,133,.12);color:var(--muted);border:1px solid rgba(99,106,133,.25)}
.empty{text-align:center;padding:28px 12px;color:var(--dim);font-size:10px;line-height:1.7}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column}
#upload-screen{flex:1;display:flex;align-items:center;justify-content:center}
.dz{border:2px dashed var(--dim);border-radius:10px;padding:50px 64px;text-align:center;cursor:pointer;transition:.2s;max-width:480px;width:100%}
.dz:hover,.dz.over{border-color:var(--cyan);background:rgba(0,212,255,.02)}
.dz-icon{font-size:36px;opacity:.25;margin-bottom:12px}
.dz-title{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.dz-sub{font-size:11px;color:var(--muted);margin-bottom:10px}
.dz-exts{display:flex;gap:6px;justify-content:center}
.ext{background:var(--surf2);border:1px solid var(--border);border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--muted);padding:2px 6px}
#nosel{flex:1;display:none;align-items:center;justify-content:center;flex-direction:column;gap:5px;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:10px}
#detail{flex:1;display:none;overflow:hidden;flex-direction:column}
.det-bar{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surf);display:flex;align-items:center;gap:10px;flex-shrink:0}
.det-pn{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;color:var(--cyan)}
.det-desc{font-size:11px;color:var(--muted);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.det-sup{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted)}
.tbl-container{flex:1;overflow:auto}
table.dt{border-collapse:collapse;width:100%}
table.dt thead th{position:sticky;top:0;z-index:5;background:var(--surf2);border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;color:var(--muted);padding:7px 10px;text-align:left;white-space:nowrap}
table.dt tbody tr:hover td{background:rgba(26,30,41,.5)}
table.dt td{padding:5px 10px;border-bottom:1px solid rgba(37,42,56,.45);vertical-align:top}
td.ci{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);text-align:right;width:36px;min-width:36px;padding-right:8px;border-right:1px solid rgba(46,51,72,.8)}
td.cn{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);min-width:200px;max-width:340px;word-break:break-word;white-space:normal;line-height:1.4;padding-right:14px}
td.cv{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text);min-width:100px;max-width:500px;word-break:break-word;white-space:pre-wrap;line-height:1.45}
td.cv.pos{color:var(--green)}
td.cv.neg{color:var(--red)}
td.cv.zero{color:var(--dim)}
td.cv.na{color:var(--dim);font-style:italic}
td.cv.empty{color:rgba(46,51,72,.8);font-size:9px}
#loading{position:fixed;inset:0;background:rgba(13,15,20,.92);z-index:999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.spin{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
#toasts{position:fixed;bottom:12px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--surf2);border:1px solid var(--border);border-radius:5px;padding:8px 12px;font-size:10px;min-width:200px;display:flex;align-items:center;gap:6px;transform:translateX(120%);transition:transform .22s cubic-bezier(.18,.89,.32,1.28);box-shadow:0 4px 16px rgba(0,0,0,.4)}
.toast.in{transform:none}
.toast.ok{border-left:2px solid var(--green)}
.toast.er{border-left:2px solid var(--red)}
.toast.nfo{border-left:2px solid var(--cyan)}
</style>
</head>
<body>
<div id="top">
  <div class="logo"><div class="logo-sq">P</div>PROCUREOS</div>
  <div class="sep"></div>
  <div id="upbtn" onclick="document.getElementById('fi').click()">↑ <span id="upbtn-label">Upload file</span></div>
  <input type="file" id="fi" accept=".xlsx,.xls,.csv" style="display:none" onchange="loadFile(this.files[0]);this.value=''">
  <div class="stats">
    <div class="stat">Parts <b id="s-parts">—</b></div>
    <div class="stat">Columns <b id="s-cols">—</b></div>
    <div class="stat"><b id="s-file">No file</b></div>
  </div>
</div>
<div id="wrap">
  <div id="side">
    <div id="side-head">
      <input id="srch" placeholder="Search PN or description…" oninput="renderList()">
      <div class="frow">
        <div class="fb on" id="f-all" onclick="setFilt('all')">All</div>
        <div class="fb" id="f-l74" onclick="setFilt('l74')">L74</div>
        <div class="fb" id="f-d74" onclick="setFilt('d74')">D74</div>
        <div class="fb" id="f-com" onclick="setFilt('com')">Commun</div>
      </div>
    </div>
    <div id="pnlist"><div class="empty">Upload a file to browse parts</div></div>
  </div>
  <div id="main">
    <div id="upload-screen">
      <div class="dz" id="dz"
        ondragover="doDrag(event,'over')" ondragleave="doDrag(event,'out')" ondrop="doDrag(event,'drop')"
        onclick="document.getElementById('fi').click()">
        <div class="dz-icon">📂</div>
        <div class="dz-title">Drop your procurement file here</div>
        <div class="dz-sub">Every column shown exactly as-is — nothing removed or changed</div>
        <div class="dz-exts"><span class="ext">.xlsx</span><span class="ext">.xls</span><span class="ext">.csv</span></div>
      </div>
    </div>
    <div id="nosel"><span style="font-size:22px;opacity:.15">◎</span>Select a part from the list</div>
    <div id="detail">
      <div class="det-bar">
        <span class="det-pn" id="d-pn">—</span>
        <span class="det-desc" id="d-desc">—</span>
        <span class="det-sup" id="d-sup"></span>
      </div>
      <div class="tbl-container">
        <table class="dt">
          <thead><tr>
            <th style="width:36px">#</th>
            <th style="min-width:200px;max-width:340px">Column Name</th>
            <th>Value</th>
          </tr></thead>
          <tbody id="tbl-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<div id="loading"><div class="spin"></div><div class="lbl" id="lbl">Loading…</div></div>
<div id="toasts"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────
let HEADERS = [];  // [{idx, name}]  — exact header names from file
let ROWS    = [];  // [{_pn:string, _raw:{colIdx:displayString}}]
let FILT    = 'all';
let SEL     = null;
let CI      = {};  // colName -> colIdx, for known columns

// ─── DRAG / FILE ─────────────────────────────────────────────────────
function doDrag(e, t) {
  e.preventDefault();
  const d = document.getElementById('dz');
  if (t === 'over') d.classList.add('over');
  else if (t === 'out') d.classList.remove('over');
  else { d.classList.remove('over'); loadFile(e.dataTransfer.files[0]); }
}

function loadFile(file) {
  if (!file) return;
  showLoad('Reading file…');
  const ext = file.name.split('.').pop().toLowerCase();
  const reader = new FileReader();
  reader.onload = e => {
    try {
      let wb;
      if (ext === 'csv') {
        wb = XLSX.read(e.target.result, { type: 'string' });
      } else {
        // raw:true keeps numbers as numbers (no locale formatting)
        // cellDates:true so date serial numbers become JS Date objects
        wb = XLSX.read(e.target.result, { type: 'binary', raw: true, cellDates: true });
      }
      setLbl('Parsing…');
      setTimeout(() => parseWB(wb, file.name), 30);
    } catch (err) {
      hideLoad();
      toast('Failed to read: ' + err.message, 'er');
    }
  };
  if (ext === 'csv') reader.readAsText(file);
  else reader.readAsBinaryString(file);
}

// ─── PARSE ───────────────────────────────────────────────────────────
function parseWB(wb, fname) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
  const maxR = range.e.r + 1;
  const maxC = range.e.c + 1;

  // Find the header row: scan for a cell whose value === "PN"
  let hRow = -1, pnCol = -1;
  scan:
  for (let r = 0; r < Math.min(25, maxR); r++) {
    for (let c = 0; c < Math.min(20, maxC); c++) {
      const cell = ws[XLSX.utils.encode_cell({ r, c })];
      if (cell && String(cell.v ?? '').trim() === 'PN') {
        hRow = r;
        pnCol = c;
        break scan;
      }
    }
  }
  if (hRow < 0) { hideLoad(); toast('Cannot find "PN" column in file', 'er'); return; }

  // Build HEADERS from that row — exact names, nothing changed
  HEADERS = [];
  for (let c = 0; c < maxC; c++) {
    const cell = ws[XLSX.utils.encode_cell({ r: hRow, c })];
    const name = cell ? String(cell.v ?? '').trim() : '';
    HEADERS.push({ idx: c, name });
  }

  // Map known column names to indices
  CI = {};
  HEADERS.forEach(h => { if (h.name) CI[h.name] = h.idx; });

  setLbl('Loading ' + (maxR - hRow - 1) + ' rows…');

  // Read all data rows
  ROWS = [];
  for (let r = hRow + 1; r < maxR; r++) {
    const pnCell = ws[XLSX.utils.encode_cell({ r, c: pnCol })];
    if (!pnCell) continue;
    const rawPN = pnCell.v;
    if (rawPN === null || rawPN === undefined) continue;
    const pnStr = String(rawPN).trim();
    if (!pnStr || pnStr === '#N/A') continue;

    // Read every column — store as display string, preserving exact value
    const raw = {};
    for (let c = 0; c < maxC && c < HEADERS.length; c++) {
      const cell = ws[XLSX.utils.encode_cell({ r, c })];
      if (!cell || cell.v === null || cell.v === undefined) {
        raw[c] = '';
        continue;
      }
      raw[c] = formatCell(cell);
    }

    ROWS.push({ _pn: pnStr, _raw: raw });
  }

  // Update UI
  document.getElementById('upload-screen').style.display = 'none';
  document.getElementById('nosel').style.display = 'flex';
  document.getElementById('s-parts').textContent = ROWS.length;
  document.getElementById('s-cols').textContent = HEADERS.length;
  const shortName = fname.replace(/\.[^.]+$/, '').substring(0, 24);
  document.getElementById('s-file').textContent = shortName;
  document.getElementById('upbtn-label').textContent = shortName.substring(0, 18) + (shortName.length > 18 ? '…' : '');

  SEL = null;
  hideLoad();
  renderList();
  toast(ROWS.length + ' parts · ' + HEADERS.length + ' columns', 'ok');
}

// Format a single cell value for display
function formatCell(cell) {
  if (!cell || cell.v === null || cell.v === undefined) return '';
  // Date
  if (cell.t === 'd' || cell.v instanceof Date) {
    const d = cell.v instanceof Date ? cell.v : new Date(cell.v);
    if (!isNaN(d.getTime())) {
      return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }
  }
  // Formula error
  if (cell.t === 'e') {
    return cell.w || '#ERR';
  }
  // Boolean
  if (cell.t === 'b') {
    return cell.v ? 'TRUE' : 'FALSE';
  }
  // Number: use raw value (no locale formatting)
  if (cell.t === 'n') {
    return String(cell.v);
  }
  // String / anything else
  return String(cell.v ?? '').trim();
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────
function setFilt(f) {
  FILT = f;
  ['all','l74','d74','com'].forEach(k => document.getElementById('f-' + k).classList.toggle('on', k === f));
  renderList();
}

function colVal(row, name) {
  const idx = CI[name];
  return idx !== undefined ? (row._raw[idx] ?? '') : '';
}

function renderList() {
  const q = (document.getElementById('srch').value || '').toLowerCase();
  const list = document.getElementById('pnlist');

  if (!ROWS.length) {
    list.innerHTML = '<div class="empty">Upload a file to browse parts</div>';
    return;
  }

  const filtered = ROWS.filter(r => {
    const pn      = r._pn.toLowerCase();
    const desc    = (colVal(r,'Descrizione') || colVal(r,'Description Pièce') || '').toLowerCase();
    const variant = (colVal(r,'D74 / L74') || '').toUpperCase();
    const type    = (colVal(r,'Type') || '').toLowerCase();

    if (q && !pn.includes(q) && !desc.includes(q)) return false;
    if (FILT === 'l74' && !variant.includes('L74')) return false;
    if (FILT === 'd74' && !variant.includes('D74')) return false;
    if (FILT === 'com' && !type.includes('commun')) return false;
    return true;
  });

  if (!filtered.length) {
    list.innerHTML = '<div class="empty">No parts match</div>';
    return;
  }

  const MAX = 500;
  list.innerHTML = filtered.slice(0, MAX).map(r => {
    const variant = (colVal(r,'D74 / L74') || '').toUpperCase();
    const type    = (colVal(r,'Type') || '');
    const desc    = (colVal(r,'Descrizione') || colVal(r,'Description Pièce') || '').substring(0, 52);
    const tags = [
      variant.includes('L74') ? '<span class="tag tag-l74">L74</span>' : '',
      variant.includes('D74') ? '<span class="tag tag-d74">D74</span>' : '',
      type.toLowerCase() === 'commun' ? '<span class="tag tag-com">COMMUN</span>' : '',
    ].join('');
    const sel = SEL === r._pn ? ' sel' : '';
    return `<div class="pn-item${sel}" onclick="showPN(${JSON.stringify(r._pn)})">
      <div class="pn-num">${esc(r._pn)}</div>
      <div class="pn-desc">${esc(desc) || '—'}</div>
      <div class="pn-tags">${tags}</div>
    </div>`;
  }).join('');

  if (filtered.length > MAX) {
    list.innerHTML += `<div class="empty" style="font-size:9px">Showing ${MAX} of ${filtered.length} — refine search</div>`;
  }
}

// ─── DETAIL ──────────────────────────────────────────────────────────
function showPN(pn) {
  SEL = pn;
  renderList();

  const matches = ROWS.filter(r => r._pn === pn);
  if (!matches.length) return;

  const row = matches[0];

  // Update header bar
  document.getElementById('d-pn').textContent = pn;
  document.getElementById('d-desc').textContent =
    colVal(row, 'Descrizione') || colVal(row, 'Description Pièce') || '—';
  const sup = (colVal(row, 'SUPPLIER') || '').replace(/^\d+\s+/, '');
  document.getElementById('d-sup').textContent = sup ? '🏭 ' + sup.substring(0, 40) : '';

  // Build table: every single column in order
  const html = HEADERS.map((h, i) => {
    const val = row._raw[h.idx] ?? '';
    const name = h.name || '';

    let cls = 'cv';
    if (!val) {
      cls += ' empty';
    } else if (/^#(N\/A|REF!|VALUE!|NAME\?|DIV\/0!|NULL!)$/.test(val)) {
      cls += ' na';
    } else {
      const num = parseFloat(val);
      if (!isNaN(num) && String(num) === val) {
        cls += num > 0 ? ' pos' : num < 0 ? ' neg' : ' zero';
      }
    }

    const displayVal  = val === '' ? '—' : esc(val.length > 800 ? val.substring(0, 800) + '…' : val);
    const displayName = name
      ? esc(name)
      : `<span style="color:var(--dim);font-size:9px">col_${h.idx + 1}</span>`;

    return `<tr>
      <td class="ci">${i + 1}</td>
      <td class="cn">${displayName}</td>
      <td class="${cls}">${displayVal}</td>
    </tr>`;
  }).join('');

  const tbody = document.getElementById('tbl-body');
  let prefix = '';
  if (matches.length > 1) {
    prefix = `<tr><td colspan="3" style="padding:6px 10px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--orange);background:rgba(255,149,0,.05);border-bottom:1px solid var(--border)">${matches.length} rows found for PN ${esc(pn)} — showing first</td></tr>`;
  }
  tbody.innerHTML = prefix + html;

  document.getElementById('nosel').style.display = 'none';
  const det = document.getElementById('detail');
  det.style.display = 'flex';
  det.querySelector('.tbl-container').scrollTop = 0;
}

// ─── UTILS ───────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function showLoad(m) { document.getElementById('loading').style.display = 'flex'; setLbl(m); }
function setLbl(m)   { document.getElementById('lbl').textContent = m; }
function hideLoad()  { document.getElementById('loading').style.display = 'none'; }
function toast(msg, type = 'nfo') {
  const tc = document.getElementById('toasts');
  const t  = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${{ok:'✓',er:'✗',nfo:'ℹ'}[type]}</span><span>${esc(msg)}</span>`;
  tc.appendChild(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('in')));
  setTimeout(() => { t.classList.remove('in'); setTimeout(() => t.remove(), 300); }, 4000);
}
</script>
</body>
</html>
